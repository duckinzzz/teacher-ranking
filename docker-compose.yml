services:
  migrate:
    image: ghcr.io/duckinzzz/teacher-ranking-backend:latest
    build:
      context: .
    container_name: teacher_ranking_migrate
    env_file:
      - .env
    volumes:
      - static_volume:/app/static
      - data_volume:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: []
    restart: "no"
    command: >
      bash -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput --clear &&
      python manage.py load_teachers data.csv
      "

  web:
    image: ghcr.io/duckinzzz/teacher-ranking-backend:latest
    build:
      context: .
    container_name: teacher_ranking_web
    env_file:
      - .env
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
      - data_volume:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/schema/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    restart: unless-stopped

  frontend:
    image: ghcr.io/duckinzzz/teacher-ranking-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: teacher_ranking_frontend
    env_file:
      - .env
    volumes:
      - frontend_dist:/app/dist
    restart: "no"

  nginx:
    image: nginx:alpine
    container_name: teacher_ranking_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
      - frontend_dist:/app/frontend:ro
    networks:
      - caddy-proxy
      - default
    labels:
      caddy: aboba.shapuel.ru
      caddy.reverse_proxy: "{{upstreams 80}}"

    depends_on:
      web:
        condition: service_started
      frontend:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:
  frontend_dist:
  data_volume:
      
networks:
  default:
  caddy-proxy:
    external: true