services:
  web:
    build:
      context: .
    container_name: teacher_ranking_web_dev
    user: root
    env_file:
      - .env
    environment:
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    entrypoint: []
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: teacher-ranking-frontend-dev
    container_name: teacher_ranking_frontend_dev
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_API_PROXY=http://web:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - web

volumes:
  static_volume:
  media_volume:
