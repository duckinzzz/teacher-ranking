upstream django_upstream {
  server web:8000;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 25m;

  # -------------------------------------------------------------------
  # Security headers
  # -------------------------------------------------------------------
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # -------------------------------------------------------------------
  # Gzip
  # -------------------------------------------------------------------
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml application/xml+rss image/svg+xml;

  # -------------------------------------------------------------------
  # Django API and admin
  # -------------------------------------------------------------------
  location /api/ {
    proxy_pass http://django_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_redirect off;
  }

  location /admin/ {
    proxy_pass http://django_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_redirect off;
  }

  # -------------------------------------------------------------------
  # Static and media files
  # -------------------------------------------------------------------
  location /static/ {
    alias /app/static/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location /media/ {
    alias /app/media/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  # -------------------------------------------------------------------
  # Frontend SPA — hashed assets (cache aggressively)
  # -------------------------------------------------------------------
  location /assets/ {
    root /app/frontend;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  # -------------------------------------------------------------------
  # Frontend SPA — entry point (never cache)
  # -------------------------------------------------------------------
  location / {
    root /app/frontend;
    try_files $uri $uri/ /index.html;
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}
